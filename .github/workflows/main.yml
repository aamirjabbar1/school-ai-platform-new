name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_VARS: ${{ secrets.BACKEND_VARIABLES }}
          FRONTEND_VARS: ${{ secrets.FRONTEND_VARIABLES }}
        with:
          host: 167.235.202.139
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: BACKEND_VARS,FRONTEND_VARS
          script: |
            set -e

            APP_DIR="/mnt/HC_Volume_105938413/apps/main-lss/school-ai-platform-new"
            cd "$APP_DIR"

            echo "==> Pulling latest code"
            git pull origin main

            echo "==> Writing root .env"
            printf '%s' "$BACKEND_VARS" > .env

            echo "==> Writing frontend/.env"
            mkdir -p frontend
            printf '%s' "$FRONTEND_VARS" > frontend/.env

            echo "==> Running docker compose"
            docker compose up --build -d --remove-orphans

            echo "==> Pruning unused images"
            docker image prune -f

            echo "==> Deployment complete"