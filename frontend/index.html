<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-Powered School Learning Platform" />
    <meta name="theme-color" content="#0b1220" />
    <title>LSS · AI Learning Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Apply persisted theme before first paint to avoid a flash of the wrong theme -->
    <script>
      (function () {
        try {
          var mode = localStorage.getItem('lss-theme') || 'dark';
          var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = mode === 'dark' || (mode === 'auto' && systemDark);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
