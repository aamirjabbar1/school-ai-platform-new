# ─── lssbot.net — Nginx Reverse Proxy ────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 300m;

    # ── Redirect HTTP → HTTPS (all domains) ──────────────────────────────────
    server {
        listen 80;
        server_name lssbot.net www.lssbot.net api.lssbot.net;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Frontend — lssbot.net + www.lssbot.net ────────────────────────────────
    server {
        listen 443 ssl;
        server_name lssbot.net www.lssbot.net;

        ssl_certificate     /etc/nginx/ssl/lssbot.net/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/lssbot.net/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ── Backend — api.lssbot.net ──────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name api.lssbot.net;

        ssl_certificate     /etc/nginx/ssl/api.lssbot.net/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/api.lssbot.net/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
